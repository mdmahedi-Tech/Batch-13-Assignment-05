<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- daisyui and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css link -->
     <link rel="stylesheet" href="./css/styles.css">
 

    

</head>
<body>
    <!-- navabr -->
    <section class=" flex justify-between items-center">
      
     <div class="navbar bg-base-100 shadow-sm flex justify-between items-center">
         <div class="flex items-center">
            <img src="./assets/github-logo.png" class="w-10 h-10">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
         </div>
    <div class="flex gap-2">
       <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
      <div class="dropdown dropdown-end">
        <button class="btn btn-active btn-primary">+ New Repository</button>
     
    </div>
  </div>
</div>   

    </section>
<!-- all buttons -->
 <section class="rounded-sm w-4/6 mx-auto mt-20 bg-white shadow-sm p-4">
    <!-- <p class="text-2xl font-bold">All Issues</p> -->
<button id="btn-all" onclick="loadAllCards()" class="btn px-8 buttons">All</button>
<button id="btn-open" onclick="loadAllCards()" class="btn px-10 buttons">Open</button>
<button id="btn-closed" onclick="loadAllCards()" class="btn px-10 buttons">Closed</button>
 </section>
 <!-- all issues section -->
  <section class="rounded-sm w-4/6 mx-auto mt-8 bg-white shadow-sm p-4 flex justify-between items-center">
   <div id="all-issues" class="flex justify-between items-center">
        <div>
            <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
            <h1 class="text-2xl font-bold"><span>50</span> issues</h1>
            <p class="text-slate-500">Track and manage your project issues</p>
        </div>
   </div>
   <div class="flex">
    <p> <span>o</span>open</p>
    <p>Closed</p>
   </div>
  </section>
  <!-- modal start -->
   <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="my_modal" class="modal">
  <div class="modal-box">
   <div id="details-container">

   </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
   <!-- modal end -->
  <!-- all cards -->
   <section id="all_cards_containers" class="rounded-sm border w-4/6 mx-auto mt-8 gap-4 bg-white shadow-sm p-4 grid sm:grid-cols-2 lg:grid-cols-4">
     
    
    
   </section>
    <!-- js file -->
     <script src="./scripts/index.js"></script>
     <!-- <script src="./scripts/test.js"></script> -->
</body>
</html>
